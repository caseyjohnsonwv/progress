# fly.toml app configuration file generated for kcj-progress on 2026-03-13T23:48:46Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kcj-progress'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory_mb = 256

[[mounts]]
  source = "kcj_progress_data"
  destination = "/data"
